# GitLab CI/CD Configuration for claw-migrate
# Node.js OpenClaw Skill

stages:
  - lint
  - test
  - build
  - deploy

# 代码质量检查
lint:
  stage: lint
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# 单元测试
test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm run test
  coverage: '/Tests:.*[0-9]+ total, ([0-9]+) passed/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# 构建验证
build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build --if-present
  artifacts:
    paths:
      - src/
      - package.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 发布到 OpenClaw 技能市场（手动触发）
deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploy to OpenClaw Skill Marketplace"
    - echo "Package version: ${CI_COMMIT_TAG:-dev}"
  when: manual
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

# 定时健康检查
health_check:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
